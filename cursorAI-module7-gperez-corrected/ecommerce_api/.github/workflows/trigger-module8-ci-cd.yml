name: Trigger Module 8 CI/CD

on:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  dispatch-module8:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch cursorAI-module7-gperez-commit
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MODULE8_CI_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'gperez-gd',
              repo: 'cursorAI-module8-gperez',
              event_type: 'cursorAI-module7-gperez-commit',
              client_payload: {
                source_repo: '${{ github.repository }}',
                source_sha: context.sha
              }
            });
